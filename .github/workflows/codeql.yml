name: "CodeQL Analysis (C++ - Robot Chess)"

on:
  push:
    branches: ["main", "master", "develop"]
  pull_request:
    branches: ["main", "master", "develop"]
  workflow_dispatch: {}

jobs:
  analyze-cpp:
    name: Analyze C++ with CodeQL
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install ROS + catkin dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-catkin-tools \
            python3-vcstool \
            cmake \
            build-essential

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: cpp
          queries: security-extended

      - name: Build ROS workspace (catkin)
        working-directory: ./DEV/ROS/catkin_ws
        run: |
          catkin_make -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:cpp"
