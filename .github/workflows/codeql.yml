name: "CodeQL Analysis (C++ - Robot Chess)"

on:
  push:
    branches: ["main", "master", "develop"]
  pull_request:
    branches: ["main", "master", "develop"]
  workflow_dispatch: {}

jobs:
  analyze-cpp:
    name: Analyze C++ with CodeQL
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Show repository structure
        run: |
          echo "=== PROJECT STRUCTURE ==="
          ls -R .

      - name: Install C++ build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: cpp
          queries: security-extended

      - name: Manual Build (placeholder)
        run: |
          echo "Kein Build definiert – bitte nach Debug-Output anpassen."
          echo "Beispiel später: g++ src/*.cpp -std=c++20 -c"

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:cpp"
