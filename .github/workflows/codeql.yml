name: "CodeQL Analysis (C++ - Robot Chess via ROS Noetic Docker)"

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master", "develop" ]
  workflow_dispatch:

jobs:
  analyze-cpp:
    name: Analyze C++ with CodeQL (Docker ROS Noetic)
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # CodeQL initialisieren (build-less, wir liefern compile_commands.json)
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: cpp
          queries: security-extended
          build-mode: none

      # Beide Workspaces im ROS-Noetic-Container bauen und compdb herauskopieren
      - name: Build workspaces inside ROS Noetic Docker
        run: |
          docker run --rm \
            -v "$PWD:/workspace" \
            -w /workspace \
            ros:noetic-desktop-full \
            bash -c '
              set -e
              source /opt/ros/noetic/setup.bash

              echo "=== DEV workspace ==="
              cd /workspace/DEV/ROS/catkin_ws
              apt-get update -y >/dev/null 2>&1 || true
              apt-get install -y python3-rosdep python3-catkin-tools >/dev/null 2>&1 || true
              rosdep init 2>/dev/null || true
              rosdep update || true
              rosdep install --from-paths src --ignore-src -r -y || true
              catkin_make -DCMAKE_EXPORT_COMPILE_COMMANDS=ON || {
                echo "----- DEV CMakeError.log -----" >&2
                cat build/CMakeFiles/CMakeError.log 2>/dev/null || true
                echo "----- DEV CMakeOutput.log ----" >&2
                cat build/CMakeFiles/CMakeOutput.log 2>/dev/null || true
                exit 1
              }
              cp build/compile_commands.json /workspace/compile_dev.json

              echo "=== SRC workspace ==="
              cd /workspace/SRC/ROS/catkin_ws
              rosdep install --from-paths src --ignore-src -r -y || true
              catkin_make -DCMAKE_EXPORT_COMPILE_COMMANDS=ON || {
                echo "----- SRC CMakeError.log -----" >&2
                cat build/CMakeFiles/CMakeError.log 2>/dev/null || true
                echo "----- SRC CMakeOutput.log ----" >&2
                cat build/CMakeFiles/CMakeOutput.log 2>/dev/null || true
                exit 1
              }
              cp build/compile_commands.json /workspace/compile_src.json
            '

      # Beide compile_commands.json zu einer Liste zusammenführen (hostseitig)
      - name: Merge compile_commands.json files
        run: |
          python3 - << 'PY'
import json, sys, os
with open('compile_dev.json') as f: dev = json.load(f)
