name: "CodeQL Analysis (C++ - Robot Chess via ROS Noetic Docker)"

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master", "develop" ]
  workflow_dispatch:

jobs:
  analyze-cpp:
    name: Analyze C++ with CodeQL (Docker ROS Noetic)
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      #############################################################
      # 1) CodeQL initialisieren (läuft HOST-SEITIG, nicht Docker)
      #############################################################
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: cpp
          queries: security-extended

      #############################################################
      # 2) Docker-Container für ROS Noetic starten
      #############################################################
      - name: Build workspaces inside ROS Noetic Docker
        run: |
          docker run --rm \
            -v "$PWD:/workspace" \
            -w /workspace \
            ros:noetic-ros-base \
            bash -c "
              set -e

              echo '=== Building DEV Workspace ==='
              cd DEV/ROS/catkin_ws
              source /opt/ros/noetic/setup.bash
              catkin_make -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
              cp build/compile_commands.json /workspace/compile_dev.json

              echo '=== Building SRC Workspace ==='
              cd /workspace/SRC/ROS/catkin_ws
              source /opt/ros/noetic/setup.bash
              catkin_make -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
              cp build/compile_commands.json /workspace/compile_src.json
            "

      #############################################################
      # 3) compile_commands.json zusammenführen
      #############################################################
      - name: Merge compile_commands.json files
        run: |
          echo "[" > compile_commands.json
          sed '1d;$d' compile_dev.json >> compile_commands.json
          echo "," >> compile_commands.json
          sed '1d;$d' compile_src.json >> compile_commands.json
          echo "]" >> compile_commands.json

      #############################################################
      # 4) CodeQL Analyse
      #############################################################
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:cpp"
