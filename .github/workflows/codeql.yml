name: "CodeQL Analysis (C++ - Robot Chess)"

on:
  push:
    branches: ["main", "master", "develop"]
  pull_request:
    branches: ["main", "master", "develop"]
  workflow_dispatch: {}

jobs:
  analyze-cpp:
    name: Analyze C++ with CodeQL
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write

    steps:
      # -----------------------------
      # 1. Repository auschecken
      # -----------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # -----------------------------
      # 2. Debug: Ordnerstruktur anzeigen
      # -> Damit sehen wir, wo deine .cpp-Dateien liegen
      # -----------------------------
      - name: Debug: Show repository structure
        run: |
          echo "=== PROJECT STRUCTURE ==="
          ls -R .

      # -----------------------------
      # 3. Compiler installieren
      # -----------------------------
      - name: Install C++ build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      # -----------------------------
      # 4. CodeQL initialisieren
      # -----------------------------
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: cpp
          queries: security-extended

      # -----------------------------
      # 5. Manueller Build
      # !!! Diesen Teil musst du später anpassen !!!
      # Aktuell kompiliert er NICHTS (absichtlich),
      # damit der Workflow nicht wegen fehlendem Build fehlschlägt.
      # -----------------------------
      - name: Manual Build (to be customized)
        run: |
          echo "⚠️  Kein Build definiert. Bitte nach Debug-Output anpassen."
          echo "Beispiel später: g++ src/*.cpp -std=c++20 -c"

      # -----------------------------
      # 6. CodeQL Analyse durchführen
