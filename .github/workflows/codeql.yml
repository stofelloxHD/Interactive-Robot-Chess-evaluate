name: "CodeQL Analysis (C++ - Robot Chess)"

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master", "develop" ]
  workflow_dispatch:

jobs:
  analyze-cpp:
    name: Analyze C++ with CodeQL
    runs-on: ubuntu-20.04   # <-- WICHTIG: ROS Noetic benötigt 20.04

    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup ROS Noetic
        run: |
          sudo sh -c 'echo "deb http://packages.ros.org/ros/ubuntu focal main" > /etc/apt/sources.list.d/ros1.list'
          sudo apt-key adv --keyserver 'hkp://keyserver.ubuntu.com:80' --recv-key 421C365BD9FF1F717815A3895523BAEEB01FA116
          sudo apt-get update
          sudo apt-get install -y ros-noetic-desktop-full python3-catkin-tools
          echo "source /opt/ros/noetic/setup.bash" >> $GITHUB_ENV

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: cpp
          queries: security-extended

      - name: Build Catkin Workspace
        run: |
          source /opt/ros/noetic/setup.bash
          cd DEV/ROS/catkin_ws
          catkin_make -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:cpp"
